<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bienvenido Cachón 💻🎶</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffcc70, #ff7eb3);
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    header {
      text-align: center;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 2.5em;
      color: #fff;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    .image-container {
      border: 5px solid #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      width: 80%;
      max-width: 600px;
      margin-bottom: 20px;
    }
    img {
      width: 100%;
      display: block;
    }
    .phrase {
      font-size: 1.5em;
      background: rgba(255,255,255,0.8);
      padding: 15px 25px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
      color: #333;
      font-weight: bold;
    }
    footer {
      margin-top: 30px;
      font-size: 1.2em;
      color: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h1>🐴🇨🇴🍺 Bienvenido Cachón alegre 💻🎶</h1>
  </header>

  <div class="image-container">
    <img src="/elcacique.png" alt="Un cachon programando">
  </div>

  <div class="phrase">
    “Tómese un águila 🍺, búsquese una prepago 💃 y ¡a codear! 💻🔥”
  </div>

</body>
</html>
